# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
    -   id: ruff
        args: [--fix]
        files: ^app/
    -   id: ruff-format
        files: ^app/

-   repo: local
    hooks:
    -   id: mypy
        name: mypy
        entry: bash -c 'cd app && uv run mypy src/'
        language: system
        types: [python]
        files: ^app/
        pass_filenames: false
    -   id: pytest
        name: pytest
        entry: bash -c 'cd app && uv run pytest -s -x -vv'
        language: system
        types: [python]
        files: ^app/
        pass_filenames: false
