multitenancy_enabled: false

target: all

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir

blocks_storage:
  filesystem:
    dir: /data/mimir/blocks

compactor:
  data_dir: /data/mimir/compactor

ingester:
  ring:
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

server:
  http_listen_port: 9009
