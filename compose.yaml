x-db-env: &db-env
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_DATABASE: ${DB_DATABASE}
  DB_ADDRESS: postgres
  DB_PORT: ${DB_PORT}

services:
  app:
    build:
        context: .
        dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *db-env
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OTLP_ENDPOINT: http://otel-collector:4317
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "8000:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

  migrations:
    build:
        context: .
        dockerfile: Dockerfile
        target: builder
    restart: no
    environment:
      <<: *db-env
    command: >
      sh -c "
        apk add gcc python3-dev musl-dev linux-headers
        uv sync --no-install-project --frozen &&
        uv run alembic upgrade head
      "
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mimir:
    image: grafana/mimir:3.0.6
    restart: unless-stopped
    volumes:
      - ./observability/mimir.yaml:/etc/mimir.yaml
      - mimir_data:/data/mimir
    command: ["--config.file=/etc/mimir.yaml"]
    ports:
      - "9009:9009"

  tempo:
    image: grafana/tempo
    restart: unless-stopped
    user: root
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/data/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki
    restart: unless-stopped
    user: root
    volumes:
      - ./observability/loki.yaml:/etc/loki.yaml
      - loki_data:/data/loki
    command: ["-config.file=/etc/loki.yaml"]
    ports:
      - "3100:3100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector.yaml
      - /:/hostfs:ro
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - mimir
      - tempo
      - loki

  grafana:
    image: grafana/grafana:main
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./observability/grafana-dashboard-provisioning.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./observability/grafana-dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - mimir
      - tempo
      - loki

volumes:
  postgres_data:
  mimir_data:
  tempo_data:
  loki_data:
  grafana_data:
