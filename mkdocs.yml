site_name: Movie Rating
site_description: A movie rating API built with FastAPI
site_author: Jvictor

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - navigation.indexes
    - navigation.top
    - navigation.tabs

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Português (BR)
      link: /pt-BR/
      lang: pt-BR

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Authentication: authentication.md
  - Database: database.md
  - API Reference: api-reference.md

plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: false
      languages:
        - locale: en-US
          default: true
          name: English
          build: true
        - locale: pt-BR
          name: Português (BR)
          build: true
          nav_translations:
            Home: Início
            Getting Started: Primeiros Passos
            Architecture: Arquitetura
            Authentication: Autenticação
            Database: Banco de Dados
            API Reference: Referência da API

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - tables
