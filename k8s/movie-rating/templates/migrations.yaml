---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-migrations
  annotation:
    "helm.sh/hook": pre-install, pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation, hook-succeeded
spec:
  ttlSecondsAfterFinished: 100
  template:
    spec:
      containers:
      - name: migrations
        automountServiceAccountToken: false
        image: {{ .Chart.Name }}-migrations:{{ .Chart.AppVersion }}
        envFrom:
          - secretRef:
              name: {{ .Chart.Name }}
        resources:
          requests:
            cpu: {{ .Values.migrations.resources.requests.cpu }}
            memory: {{ .Values.migrations.resources.requests.memory }}
            ephemeral-storage: {{ index .Values.migrations.resources.requests "ephemeral-storage" }}
          limits:
            cpu: {{ .Values.migrations.resources.limits.cpu }}
            memory: {{ .Values.migrations.resources.limits.memory }}
            ephemeral-storage: {{ index .Values.migrations.resources.limits "ephemeral-storage" }}
        command:
        - /bin/sh
        - -c
        - |
          apk add gcc python3-dev musl-dev linux-headers
          uv sync --no-install-project --frozen &&
          uv run alembic upgrade head
      restartPolicy: Never
